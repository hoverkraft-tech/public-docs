version: 2

updates:
  - package-ecosystem: "npm"
    open-pull-requests-limit: 20
    directories:
      - "/application"
      - "/.github/actions/**/"
    versioning-strategy: increase
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: friday
      time: "04:00"
    groups:
      npm-docusaurus-dependencies:
        patterns:
          - "@docusaurus/*"
          - "react"
          - "react-*"
          - "@mdx-js/react"
          - "clsx"
          - "prism-react-renderer"
          - "@hoverkraft/docusaurus-theme"
      npm-development-dependencies:
        dependency-type: "development"
        patterns:
          - "*"
      npm-production-dependencies:
        dependency-type: "production"
        patterns:
          - "*"

  - package-ecosystem: github-actions
    open-pull-requests-limit: 20
    directories:
      - "/"
      - "/.github/actions/**/action.yml"
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: friday
      time: "04:00"
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "devcontainers"
    open-pull-requests-limit: 20
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: friday
      time: "04:00"

  - package-ecosystem: "docker"
    open-pull-requests-limit: 20
    directory: "/"
    cooldown:
      default-days: 7
    schedule:
      interval: weekly
      day: friday
      time: "04:00"
    groups:
      docker-dependencies:
        patterns:
          - "*"
